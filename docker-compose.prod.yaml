# ============================================================
# LearningChinese - Docker Compose PRODUCTION
# Domain: learnzh.website | SSL: Let's Encrypt
# ============================================================
# Deploy trên Ubuntu:
#   1. Copy folder Web_Build lên server
#   2. chmod +x deploy.sh && ./deploy.sh
#   3. docker-compose -f docker-compose.prod.yaml up -d
# ============================================================

services:
  # ── PostgreSQL Database ──
  postgres:
    image: postgres:16-alpine
    container_name: lc-postgres
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "10"
    environment:
      POSTGRES_DB: LearningChinese
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-LearningChinese@2026}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Không expose port 5432 ra ngoài trong production (bảo mật)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d LearningChinese"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (.NET 9 API) ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lc-backend
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__PostgresConnectionStrings: "Host=postgres;Port=5432;Database=LearningChinese;Username=postgres;Password=${DB_PASSWORD:-LearningChinese@2026};Trust Server Certificate=true"
      AudioOptions__RootPath: /app/audio
      AudioOptions__VocabulariesFolder: Vocabularies
      AudioOptions__ExamplesFolder: Examples
      AudioOptions__DefaultSpeed: "0.8"
      Storage__RootPath: /app/uploads
      ContactStorage__RootPath: /app/uploads/contacts
    # Không expose port ra ngoài — chỉ truy cập qua nginx
    volumes:
      - audio_data:/app/audio
      - uploads_data:/app/uploads

  # ── Frontend (Angular + Nginx + SSL) ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: lc-frontend
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot

  # ── Certbot — Tự động renew SSL ──
  certbot:
    image: certbot/certbot:latest
    container_name: lc-certbot
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Tự động renew mỗi 12 tiếng
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

networks:
  lc-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  audio_data:
    driver: local
  uploads_data:
    driver: local
  certbot_conf:
    driver: local
  certbot_www:
    driver: local
