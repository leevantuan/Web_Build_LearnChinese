# ============================================================
# LearningChinese - Docker Compose
# ============================================================
# Workflow:
#   1. Build FE & BE trước (xem build.ps1)
#   2. docker-compose up -d --build
# ============================================================

services:
  # ── PostgreSQL Database ──
  postgres:
    image: postgres:16-alpine
    container_name: lc-postgres
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "10"
    environment:
      POSTGRES_DB: LearningChinese
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: LearningChinese@2026
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d LearningChinese"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (.NET 9 API) ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lc-backend
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "10"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./audio_files:/app/audio_files
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__PostgresConnectionStrings: "Host=postgres;Port=5432;Database=LearningChinese;Username=postgres;Password=LearningChinese@2026;Trust Server Certificate=true"
    ports:
      - "5154:8080"

  # ── Frontend (Angular + Nginx) ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lc-frontend
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - backend
    ports:
      - "4200:80"

volumes:
  postgres_data:
    driver: local
